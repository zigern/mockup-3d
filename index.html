<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mockup 3D</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #1a1a2e; display: flex; height: 100vh; font-family: sans-serif; }

      #sidebar {
        width: 260px;
        background: #16213e;
        padding: 24px 16px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        color: white;
        overflow-y: auto;
      }

      #sidebar h1 { font-size: 18px; color: #e2e8f0; }
      label { font-size: 12px; color: #94a3b8; margin-bottom: 4px; display: block; }

      input[type="file"] {
        width: 100%; padding: 8px;
        border-radius: 8px; border: none;
        background: #0f3460; color: white;
        cursor: pointer; font-size: 13px;
      }

      input[type="color"] {
        width: 100%; height: 40px;
        padding: 4px; border-radius: 8px;
        border: none; background: #0f3460;
        cursor: pointer;
      }

      .slider-group { display: flex; flex-direction: column; gap: 4px; }
      .slider-row { display: flex; align-items: center; gap: 8px; }

      input[type="range"] {
        flex: 1; accent-color: #e94560;
      }

      .val { font-size: 12px; color: #e2e8f0; width: 32px; text-align: right; }

      button {
        width: 100%; padding: 10px;
        border-radius: 8px; border: none;
        background: #e94560; color: white;
        font-weight: bold; font-size: 14px;
        cursor: pointer; margin-top: auto;
      }
      button:hover { background: #c73652; }

      #canvas-container { flex: 1; }
    </style>
  </head>
  <body>
    <div id="sidebar">
      <h1>🎨 Mockup 3D</h1>

      <div>
        <label>Upload do design (PNG)</label>
        <input type="file" id="upload" accept="image/png,image/jpeg" />
      </div>

      <div>
        <label>Cor da peça</label>
        <input type="color" id="colorPicker" value="#ffffff" />
      </div>

      <div class="slider-group">
        <label>Tamanho do design</label>
        <div class="slider-row">
          <input type="range" id="designSize" min="50" max="800" value="400" />
          <span class="val" id="sizeVal">400</span>
        </div>
      </div>

      <div class="slider-group">
        <label>Posição X (horizontal)</label>
        <div class="slider-row">
          <input type="range" id="designX" min="-500" max="500" value="0" />
          <span class="val" id="xVal">0</span>
        </div>
      </div>

      <div class="slider-group">
        <label>Posição Y (vertical)</label>
        <div class="slider-row">
          <input type="range" id="designY" min="-500" max="500" value="-50" />
          <span class="val" id="yVal">-50</span>
        </div>
      </div>

      <button id="exportBtn">⬇ Exportar Imagem</button>
    </div>

    <div id="canvas-container"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
