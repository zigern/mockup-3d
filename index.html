<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ThreadLab | Convert 2D to 3D</title>
  </head>
  <body>
    <main class="catalog-page">
      <section class="hero-lite">
        <h1>Convert your 2D Designs to 3D</h1>
        <p>Select one of our blanks, add your designs, and export.</p>
      </section>

      <section class="blanks-grid" id="catalogo">
        <article class="blank-card">
          <span class="badge">Free</span>
          <button class="info" type="button" aria-label="Info">i</button>
          <img src="/src/assets/hero.png" alt="Oversized tee" class="variant-1" />
          <a class="customize" href="#studio">Customize</a>
        </article>

        <article class="blank-card">
          <button class="info" type="button" aria-label="Info">i</button>
          <img src="/src/assets/hero.png" alt="Classic tee" class="variant-2" />
          <a class="customize" href="#studio">Customize</a>
        </article>

        <article class="blank-card">
          <button class="info" type="button" aria-label="Info">i</button>
          <img src="/src/assets/hero.png" alt="Relaxed tee" class="variant-3" />
          <a class="customize" href="#studio">Customize</a>
        </article>

        <article class="blank-card">
          <button class="info" type="button" aria-label="Info">i</button>
          <img src="/src/assets/hero.png" alt="Crew sweatshirt" class="variant-4" />
          <a class="customize" href="#studio">Customize</a>
        </article>

        <article class="blank-card">
          <button class="info" type="button" aria-label="Info">i</button>
          <img src="/src/assets/hero.png" alt="Ladies tee" class="variant-5" />
          <a class="customize" href="#studio">Customize</a>
        </article>

        <article class="blank-card">
          <button class="info" type="button" aria-label="Info">i</button>
          <img src="/src/assets/hero.png" alt="Hoodie" class="variant-6" />
          <a class="customize" href="#studio">Customize</a>
        </article>
      </section>

      <section id="studio" class="studio-wrap">
        <aside id="sidebar">
          <h2>Studio 3D</h2>
          <p class="panel-sub">Personaliza o mockup em tempo real.</p>

          <div class="field">
            <label for="upload">Upload do design (PNG/JPG)</label>
            <input type="file" id="upload" accept="image/png,image/jpeg" />
          </div>

          <div class="field">
            <label for="colorPicker">Cor da peca</label>
            <input type="color" id="colorPicker" value="#ffffff" />
          </div>

          <div class="slider-group">
            <label for="designSize">Tamanho do design</label>
            <div class="slider-row">
              <input type="range" id="designSize" min="50" max="800" value="400" />
              <span class="val" id="sizeVal">400</span>
            </div>
          </div>

          <div class="slider-group">
            <label for="designX">Posicao X (horizontal)</label>
            <div class="slider-row">
              <input type="range" id="designX" min="-500" max="500" value="0" />
              <span class="val" id="xVal">0</span>
            </div>
          </div>

          <div class="slider-group">
            <label for="designY">Posicao Y (vertical)</label>
            <div class="slider-row">
              <input type="range" id="designY" min="-500" max="500" value="-50" />
              <span class="val" id="yVal">-50</span>
            </div>
          </div>

          <button id="exportBtn">Exportar imagem</button>
        </aside>

        <div class="viewer-shell">
          <div class="viewer-top">
            <p>Preview ao vivo</p>
            <span>Arrasta para rodar</span>
          </div>
          <div id="canvas-container"></div>
        </div>
      </section>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
