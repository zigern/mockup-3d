name: Build and Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Normalize Hostinger connection values
        shell: bash
        run: |
          RAW_HOST="${{ secrets.SFTP_HOST }}"
          HOST="${RAW_HOST#ftp://}"
          HOST="${HOST#ftps://}"
          HOST="${HOST#sftp://}"
          HOST="${HOST#ssh://}"
          HOST="${HOST%%/*}"
          HOST="$(echo "$HOST" | xargs)"

          echo "DEPLOY_HOST=$HOST" >> "$GITHUB_ENV"

      - name: Deploy dist to Hostinger domain public_html via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ env.DEPLOY_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./dist/
          server-dir: /public_html/
