name: Build and Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Normalize Hostinger connection values
        shell: bash
        run: |
          RAW_HOST="${{ secrets.SSH_HOST }}"
          if [ -z "$RAW_HOST" ]; then
            RAW_HOST="${{ secrets.SFTP_HOST }}"
          fi
          HOST="${RAW_HOST#ftp://}"
          HOST="${HOST#ftps://}"
          HOST="${HOST#sftp://}"
          HOST="${HOST#ssh://}"
          HOST="${HOST%%/*}"
          HOST="$(echo "$HOST" | xargs)"

          RAW_PORT="${{ secrets.SSH_PORT }}"
          if [ -z "$RAW_PORT" ]; then
            RAW_PORT="${{ secrets.SFTP_PORT }}"
          fi
          PORT="$(echo "$RAW_PORT" | xargs)"
          if [ -z "$PORT" ] || [ "$PORT" = "21" ]; then
            PORT="65002"
          fi

          echo "DEPLOY_HOST=$HOST" >> "$GITHUB_ENV"
          echo "DEPLOY_PORT=$PORT" >> "$GITHUB_ENV"

      - name: Deploy dist to Hostinger domain public_html via SSH/SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          server: ${{ env.DEPLOY_HOST }}
          username: ${{ secrets.SSH_USERNAME || secrets.SFTP_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD || secrets.SFTP_PASSWORD }}
          port: ${{ env.DEPLOY_PORT }}
          timeout: 120s
          command_timeout: 6m
          source: "dist/*"
          target: "/home/${{ secrets.SSH_USERNAME || secrets.SFTP_USERNAME }}/domains/lightpink-ibex-111892.hostingersite.com/public_html/"
          strip_components: 1
          overwrite: true
